# 最小可运行基线配置：冻结参数，不执行自动搜索。
random_seed: 2026
data:
  canonical: data/processed/liu_vehicle_canonical_1s.csv
  demand_table: data/processed/power_demand_from_dynamics.csv
  stack_map: data/processed/current_point_degradation_h2.csv
  dynamics_metrics: data/results/vehicle_dynamics_metrics.json
outputs:
  demand_table: data/processed/baseline_power_demand.csv
  prediction_results: data/processed/baseline_prediction_results.csv
  result_dir: data/results/baseline
  figure_dir: figures/baseline
prediction:
  model_family: xgboost
  history_s: 30
  horizons_s: [1, 3, 5, 10]
  default_horizon_s: 5
  split: [0.70, 0.15, 0.15]
  purge_gap_equals_horizon: true
allocation:
  test_sequence_policy: longest_contiguous_prefix
  test_length_s: 3600
  default_horizon_s: 5
  confidence_decay: 0.08
  minimum_dwell_s: 15
  weights:
    hydrogen: 0.45
    degradation_proxy: 2.50
    battery_use: 1.50
    soc: 3.00
    switch: 0.10
    smooth: 0.10
constraints:
  battery_charge_limit_kw: -75.0
  battery_discharge_limit_kw: 120.0
  soc_min: 0.30
  soc_max: 0.90
  soc_reference: 0.70
interpretation:
  degradation_proxy: "刘占伟老化参数/性能损失表形成的代理代价，不是真实材料退化系数。"
  hydrogen_model: "170节电堆的法拉第理论耗氢，尚未由实测耗氢完成校准。"
  battery_model: "37 kWh简化Rint/SOC模型；容量、内阻和效率仍需车辆级校准。"
